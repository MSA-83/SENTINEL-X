# wrangler.toml
name = "sentinel-x"
pages_build_output_dir = "./dist"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_compat"]

# === BINDINGS ===

# KV for caching live OSINT data (aircraft, vessels, fires, etc.)
[[kv_namespaces]]
binding = "OSINT_CACHE"
id = "f127dbda9d414c1e84524883069c83f5"          # ← replace with the ID from step 1

# D1 for storing historical events/alerts
[[d1_databases]]
binding = "DB"
database_name = "sentinel-db"
database_id = "dc82db2a-b566-4dff-bdd2-6a7dcaf248e9"   # ← replace with the ID from step 1

# Workers AI for on-edge LLM threat scoring & natural-language queries
[ai]
binding = "AI"
