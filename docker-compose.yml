version: "3.8"

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

  # API Server (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sentinel-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@postgres:5432/sentinel
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-sentinel-secret-key}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sentinel-net
    restart: unless-stopped

  # Frontend (Vite + React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - sentinel-net
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    networks:
      - sentinel-net
    restart: unless-stopped

networks:
  sentinel-net:
    driver: bridge

volumes:
  postgres_data: