name: Weekly Agent Retraining

on:
  schedule:
    # Every Monday at 2am UTC (free tier best time)
    - cron: '0 2 * * 1'
  # Manual trigger
  workflow_dispatch:

jobs:
  train-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # GitHub free tier max 60 min
    
    steps:
      - uses: actions/checkout@v4
      
      # Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Cache dependencies
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      # Install dependencies
      - name: Install dependencies
        run: |
          pip install -q \
            langchain-groq langchain \
            sentence-transformers torch \
            pandas numpy scikit-learn \
            wandb datasets peft \
            bitsandbytes transformers pydantic
      
      # Train Classifier Agent
      - name: Train Classifier Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python agents/classifier_train.py --output results/classifier_v$(date +%Y%m%d).json
      
      # Train Anomaly Agent
      - name: Train Anomaly Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python agents/anomaly_train.py --output results/anomaly_v$(date +%Y%m%d).json
      
      # Train Dataset Curator
      - name: Train Dataset Curator Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python agents/curator_train.py --output results/curator_v$(date +%Y%m%d).json
      
      # Compare metrics
      - name: Compare metrics
        run: |
          python scripts/compare_metrics.py results/
      
      # Commit results
      - name: Commit training results
        run: |
          git config user.name "Agent-Bot"
          git config user.email "bot@sentinel-x.dev"
          git add results/
          git commit -m "✅ Auto-train agents: $(date +%Y-%m-%d)" || true
          git push
      
      # Push to HF Hub if improved
      - name: Push improved models to Hub
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token $HF_TOKEN
          python scripts/push_to_hub.py results/

      # Notify Slack
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🤖 Agent Training Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Weekly Agent Training*\n${{ job.status }}\nClassifier | Anomaly | Curator"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # Run matrix tests on different Groq models
  test-models:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        groq_model:
          - llama-3.1-70b-versatile
          - llama-3.1-8b-instant
          - mixtral-8x7b-32768
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Test with ${{ matrix.groq_model }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ matrix.groq_model }}
        run: |
          pip install -q langchain-groq langchain
          python scripts/test_model.py --model $GROQ_MODEL
